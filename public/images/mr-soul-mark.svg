<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="msm-left"><rect x="0" y="0" width="50" height="100"/></clipPath>
    <clipPath id="msm-right"><rect x="50" y="0" width="50" height="100"/></clipPath>
  </defs>

  <!-- Gold outer ring -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="#D4AF37" stroke-width="1.8"/>

  <!-- Red left half -->
  <circle cx="50" cy="50" r="47" fill="#C41E3A" clip-path="url(#msm-left)"/>

  <!-- Dark right half -->
  <circle cx="50" cy="50" r="47" fill="#0A0208" clip-path="url(#msm-right)"/>

  <!-- Subtle center blend -->
  <ellipse cx="50" cy="50" rx="13" ry="47" fill="#5C0E1A" opacity="0.45"/>

  <!-- Mr — left side -->
  <text x="26" y="50"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle">Mr</text>

  <!-- SOUL — right side -->
  <text x="73" y="48"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle">SOUL</text>

  <!-- Bistro &amp; cafe — tiny, right side -->
  <text x="73" y="62"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="5.5"
    fill="rgba(255,255,255,0.62)"
    text-anchor="middle"
    dominant-baseline="middle">BISTRO &amp; CAFE</text>
</svg>
