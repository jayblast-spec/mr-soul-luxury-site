<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <clipPath id="left-clip">
      <rect x="0" y="0" width="140" height="280"/>
    </clipPath>
    <clipPath id="right-clip">
      <rect x="140" y="0" width="140" height="280"/>
    </clipPath>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="140" cy="140" r="136" fill="none" stroke="#D4AF37" stroke-width="2"/>

  <!-- Black circle (left half) -->
  <circle cx="140" cy="140" r="133" fill="#0A0208" clip-path="url(#left-clip)"/>
  <!-- Red circle (right half) -->
  <circle cx="140" cy="140" r="133" fill="#C41E3A" clip-path="url(#right-clip)"/>

  <!-- Overlap zone: dark crimson blend in center -->
  <ellipse cx="140" cy="140" rx="36" ry="133" fill="#5C0E1A" opacity="0.55"/>

  <!-- "Mr" — left side, large serif -->
  <text x="72" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="auto">Mr</text>

  <!-- Divider line in center -->
  <line x1="140" y1="80" x2="140" y2="200" stroke="rgba(212,175,55,0.35)" stroke-width="1"/>

  <!-- "SOUL" — right side, large serif -->
  <text x="208" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="auto" letter-spacing="2">SOUL</text>

  <!-- "Bistro" — left side, small -->
  <text x="72" y="164" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="rgba(255,255,255,0.72)" text-anchor="middle" letter-spacing="1.5">BISTRO</text>

  <!-- "&amp; Cafe" — left side, small -->
  <text x="72" y="181" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="rgba(255,255,255,0.72)" text-anchor="middle" letter-spacing="1.5">&amp; CAFE</text>

  <!-- Bottom gold arc text placeholder -->
  <path id="bottom-arc" d="M 30 180 A 120 120 0 0 0 250 180" fill="none"/>
</svg>
