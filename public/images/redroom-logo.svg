<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1A0408"/>
      <stop offset="100%" stop-color="#040004"/>
    </radialGradient>
  </defs>

  <!-- Dark circular background -->
  <circle cx="160" cy="160" r="156" fill="url(#bg-grad)"/>
  <!-- Outer ring -->
  <circle cx="160" cy="160" r="156" fill="none" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="160" cy="160" r="148" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="0.75"/>

  <!-- Ambient red glow center -->
  <circle cx="160" cy="160" r="80" fill="rgba(196,30,58,0.07)"/>

  <!-- "LOUNGE" vertical text — left side -->
  <text
    x="44" y="160"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    font-weight="700"
    fill="rgba(212,175,55,0.7)"
    text-anchor="middle"
    letter-spacing="4"
    writing-mode="tb"
    transform="rotate(180 44 160)"
  >LOUNGE</text>

  <!-- Door icon replacing the two O's concept — stylised arch door -->
  <g transform="translate(160, 148)">
    <!-- Door frame -->
    <rect x="-14" y="0" width="28" height="36" rx="14" fill="none" stroke="#C41E3A" stroke-width="1.5"/>
    <!-- Door panel -->
    <rect x="-10" y="4" width="20" height="28" rx="10" fill="rgba(196,30,58,0.18)"/>
    <!-- Door handle -->
    <circle cx="7" cy="20" r="2" fill="#D4AF37" opacity="0.8"/>
  </g>

  <!-- "Red" — crimson, large serif -->
  <text x="110" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" font-style="italic" fill="#C41E3A" text-anchor="end" dominant-baseline="auto">Red</text>

  <!-- "room" — white, large serif (after the door icon) -->
  <text x="212" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" font-style="italic" fill="white" text-anchor="start" dominant-baseline="auto">room</text>

  <!-- Decorative rule -->
  <line x1="80" y1="196" x2="240" y2="196" stroke="rgba(212,175,55,0.3)" stroke-width="0.75"/>

  <!-- "BY MR SOUL" -->
  <text x="160" y="212" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="3">BY MR SOUL</text>

  <!-- Decorative dots -->
  <circle cx="72" cy="212" r="2" fill="#C41E3A" opacity="0.5"/>
  <circle cx="248" cy="212" r="2" fill="#C41E3A" opacity="0.5"/>
</svg>
