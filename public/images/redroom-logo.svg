<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <!-- Black circle background -->
  <circle cx="160" cy="160" r="158" fill="#060006"/>

  <!-- Subtle red center glow -->
  <circle cx="160" cy="155" r="100" fill="rgba(196,30,58,0.06)"/>

  <!-- "Red" — bold serif, crimson -->
  <text x="52" y="180"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-weight="900"
    fill="#C41E3A"
    letter-spacing="-1">Red</text>

  <!-- "r" — before the doors -->
  <text x="151" y="180"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-weight="900"
    fill="#C41E3A"
    letter-spacing="-1">r</text>

  <!-- Door icon 1 (left "o") -->
  <g transform="translate(175, 128)">
    <!-- Frame -->
    <rect x="0" y="0" width="19" height="48" rx="9.5" fill="none" stroke="#C41E3A" stroke-width="2.5"/>
    <!-- Arch fill hint -->
    <path d="M2,9.5 A7.5,7.5 0 0,1 17,9.5 L17,2 A9.5,9.5 0 0,0 2,2 Z" fill="#C41E3A" opacity="0.2"/>
    <!-- Handle -->
    <circle cx="14" cy="29" r="2.2" fill="#C41E3A"/>
    <!-- Hinge top -->
    <rect x="1" y="5" width="3" height="5" rx="1" fill="#C41E3A" opacity="0.6"/>
    <!-- Hinge bottom -->
    <rect x="1" y="36" width="3" height="5" rx="1" fill="#C41E3A" opacity="0.6"/>
  </g>

  <!-- Door icon 2 (right "o") -->
  <g transform="translate(196, 128)">
    <rect x="0" y="0" width="19" height="48" rx="9.5" fill="none" stroke="#C41E3A" stroke-width="2.5"/>
    <path d="M2,9.5 A7.5,7.5 0 0,1 17,9.5 L17,2 A9.5,9.5 0 0,0 2,2 Z" fill="#C41E3A" opacity="0.2"/>
    <circle cx="5" cy="29" r="2.2" fill="#C41E3A"/>
    <rect x="15" y="5" width="3" height="5" rx="1" fill="#C41E3A" opacity="0.6"/>
    <rect x="15" y="36" width="3" height="5" rx="1" fill="#C41E3A" opacity="0.6"/>
  </g>

  <!-- "m" — after doors -->
  <text x="218" y="180"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-weight="900"
    fill="#C41E3A"
    letter-spacing="-1">m</text>

  <!-- "LOUNGE" — vertical, left of the "ed" in Redroom -->
  <text
    x="92" y="170"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8.5"
    font-weight="700"
    fill="#C41E3A"
    letter-spacing="3.5"
    text-anchor="middle"
    transform="rotate(-90, 92, 155)">LOUNGE</text>

  <!-- Rule below main text -->
  <line x1="120" y1="193" x2="268" y2="193" stroke="rgba(196,30,58,0.35)" stroke-width="0.75"/>

  <!-- "BY MR SOUL" -->
  <text x="210" y="208"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11.5"
    font-weight="700"
    fill="#C41E3A"
    text-anchor="middle"
    letter-spacing="2.5">BY MR SOUL</text>
</svg>
